<div class="result-screen" #resultScreen>
    <!-- Animated background: position:absolute so html2canvas can capture it -->
    @if (glassEnabled && animatedBackground !== 'none') {
        <canvas #animatedBg class="animated-background"></canvas>
    }

    <div class="result-header" data-liquid-ignore>
        <h1>Recommendation Matrix</h1>
        <button mat-flat-button color="primary" class="glass-toggle-button" (click)="onToggleGlass()">
            {{ glassEnabled ? 'Disable Liquid Glass' : 'Enable Liquid Glass' }}
        </button>
    </div>

    @if (results && results.length > 0) {
        <div class="results-container" [class.glass-mode]="glassEnabled">
            @for (game of results; track game.appId) {
                <app-game-card [game]="game" [glassEnabled]="glassEnabled"></app-game-card>
            }
        </div>
    } @else {
        <p class="empty-state">No results found. Adjust your filters and run another scan.</p>
    }

    <div data-liquid-ignore>
        <button mat-button="filled" routerLink="/" class="back-button">Back to query</button>
    </div>
</div>

<app-glass-settings (settingsChanged)="onGlassSettingsChanged($event)"></app-glass-settings>
