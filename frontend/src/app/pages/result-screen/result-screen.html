<div class="result-screen">
    <div class="result-header">
        <h1>Results</h1>
    </div>

    @if (results && results.length > 0) {
        <div class="results-container">
            @for (game of results; track game.appId) {
                <app-game-card [game]="game"></app-game-card>
            }
        </div>
    } @else {
        <p class="empty-state">No results found. Adjust your filters and run another scan.</p>
    }

    <div>
        <button mat-button="filled" routerLink="/" class="back-button">Back to search</button>
    </div>
</div>
