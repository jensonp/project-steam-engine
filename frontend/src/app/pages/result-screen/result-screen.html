<div class="result-screen">
    <h1>Recommendations</h1>

    @if (results && results.length > 0) {
        <div class="results-container">
            @for (game of results; track game) {
                <app-game-card [game]="game"></app-game-card>
            }
        </div>
    } @else {
        <p>No results found. Try adjusting your preferences and searching again!</p>
    }

    <button mat-button="filled" routerLink="/">Back to query</button>
</div>
