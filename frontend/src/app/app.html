<mat-toolbar color="primary" class="app-toolbar">
    <img id="header-icon" src="gaben.jpg">
    <!-- <mat-icon>sports_esports</mat-icon> -->
    <span id="header-title">Steam Game Recommender</span>

<main class="main-content">

</main>

<footer class="app-footer">
    <p>Team Steam Engine • Built with Angular + Node.js + PostgreSQL</p>
</footer>
