<mat-toolbar color="primary" class="app-toolbar">
    <img routerLink="/" id="header-icon" src="steam.png" alt="Steam Engine home">
    <div routerLink="/" class="brand-block">
        <span id="header-title">Steam Engine</span>
        <span id="header-tag">Storefront query terminal</span>
    </div>
    <!-- <ul>
      <li routerLink="/todos">Todos</li>
    </ul> -->
    <button
        id="valve-button"
        type="button"
        [attr.aria-label]="valveEnabled ? 'Disable valve backdrop' : 'Enable valve backdrop'"
        [attr.aria-pressed]="valveEnabled"
        (pointerdown)="onValvePointerDown($event)"
        (pointermove)="onValvePointerMove($event)"
        (click)="toggleValveBackdrop()">
        @if (valveEnabled) {
            <model-viewer
                class="toolbar-valve-model"
                [class.is-full-spin]="valveSpinMode === 'full'"
                [class.is-flat-spin]="valveSpinMode !== 'full'"
                src="/models/red-valve.glb"
                alt=""
                tabindex="-1"
                auto-rotate
                auto-rotate-delay="700"
                [attr.rotation-per-second]="valveSpinMode === 'full' ? '72deg' : '38deg'"
                camera-controls
                disable-zoom
                disable-pan
                interaction-prompt="none"
                reveal="auto"
                loading="eager"
                environment-image="neutral"
                exposure="1.06"
                shadow-intensity="0.7"></model-viewer>
        } @else {
            <mat-icon id="valve-off-icon" aria-hidden="true">visibility_off</mat-icon>
        }
    </button>
    <button
        id="valve-spin-button"
        type="button"
        [class.is-full-spin]="valveSpinMode === 'full'"
        [attr.aria-label]="
            valveSpinMode === 'full'
                ? 'Switch valve spin mode to flat'
                : 'Switch valve spin mode to full 3D'
        "
        [attr.aria-pressed]="valveSpinMode === 'full'"
        (click)="toggleValveSpinMode()">
        <mat-icon id="valve-spin-icon" aria-hidden="true">
            {{ valveSpinMode === 'full' ? '3d_rotation' : 'rotate_right' }}
        </mat-icon>
    </button>
    <button id="config-button" routerLink="/config" aria-label="Open settings">
        <mat-icon id="config-icon" aria-hidden="true">settings</mat-icon>
    </button>
</mat-toolbar>


<main class="main-content">
    <!-- <app-user-search #searchComponent (search)="onSearch($event)"></app-user-search> -->
    <!-- <app-game-library [library]="library" [profile]="profile" [isLoading]="isLoading"></app-game-library> -->

    <router-outlet/>
</main>
